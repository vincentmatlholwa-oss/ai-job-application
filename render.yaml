services:
  - type: web
    name: ai-job-application
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install --include=dev && npm run build
    startCommand: cd backend && npm install && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3009
      - key: OPENAI_API_KEY
        sync: false
